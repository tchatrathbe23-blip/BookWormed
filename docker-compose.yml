version: '3.8'
services:
  backend:
    build: ./backend
    container_name: bookwormd-backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend/bookwormd.sqlite:/app/bookwormd.sqlite
    environment:
      - NODE_ENV=production
      - PORT=5000
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: bookwormd-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
